# Tuned for ~6 GB RAM machines: one small Gradle process, no Kotlin side-daemon.
# Trade-off: builds are slower, but ~2 GB less RAM is held after you stop building.
org.gradle.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=256m -Dfile.encoding=UTF-8
org.gradle.daemon.idletimeout=5
kotlin.compiler.execution.strategy=in-process
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
