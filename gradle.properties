# Heap limits sized for low-RAM build machines (Gradle daemon + Kotlin daemon
# + dex workers must fit together); raise them on beefier hardware if builds
# feel slow.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx1024m
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
